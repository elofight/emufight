name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"
jobs:
  emufight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y build-essential
      - run: cargo test --lib --features netplay
      - run: cargo doc --no-deps --features netplay
      - run: cargo check --all-features
  emufight-sdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y build-essential libsdl2-dev pkg-config
      - run: cargo check --bin emufight-sdl --features sdl-host
